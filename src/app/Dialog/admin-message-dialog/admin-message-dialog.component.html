<h2 mat-dialog-title>Admin Message</h2>

<mat-dialog-content>

    <mat-form-field class="full-width">
        <mat-label>Message for users</mat-label>
        <textarea matInput rows="4" [(ngModel)]="message"></textarea>
    </mat-form-field>

    <mat-form-field class="full-width">
        <mat-label>Start Date & Time</mat-label>
        <input matInput type="datetime-local" [(ngModel)]="startTime">
    </mat-form-field>

    <mat-form-field class="full-width">
        <mat-label>End Date & Time</mat-label>
        <input matInput type="datetime-local" [(ngModel)]="endTime">
    </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="close()">Cancel</button>
    <button mat-button color="warn" (click)="clear()">Clear</button>
    <button mat-raised-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
