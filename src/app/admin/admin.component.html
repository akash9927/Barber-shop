<mat-toolbar color="warn">
    <span>Admin Dashboard</span>

    <span class="spacer"></span>
    <button mat-button (click)="openMessagePopup()">
        Message
    </button>

    <button mat-button (click)="logout()">Logout</button>
</mat-toolbar>

<mat-card class="admin-card">
    <mat-card-title>All Users Bookings</mat-card-title>

    <table mat-table [dataSource]="bookings" class="mat-elevation-z8">

        <ng-container matColumnDef="user">
            <th mat-header-cell *matHeaderCellDef>User</th>
            <td mat-cell *matCellDef="let b">{{ b.userName }}</td>
        </ng-container>

        <ng-container matColumnDef="time">
            <th mat-header-cell *matHeaderCellDef>Date & Time</th>
            <td mat-cell *matCellDef="let b">
                {{ b.dateTime | date:'medium' }}
            </td>
        </ng-container>

        <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef>Action</th>
            <td mat-cell *matCellDef="let b">
                <button mat-button color="warn" (click)="rejectBooking(b.id)">
                    Reject
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>


    <p *ngIf="!bookings.length">
        No bookings available
    </p>
</mat-card>
